{% extends 'catalog/base.html' %}
{% block content %}
<div class="col-md-4">
    <div class="card mb-4 box-shadow">
        <img class="card-img-top"
             src="{{ object.image }}" height="300"
             alt="Card image cap">
        <div style="height: 170px;" class="card-body">
            <h3 class="card-title pricing-card-title">Группа товаров: {{ object.category.name}}</h3>
                        <h3 class="card-title pricing-card-title">Стоимость {{ object.price }} руб.</h3>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <a href="{% url 'catalog:index' %}" class="btn btn-sm btn-outline-secondary">Вернуться к товарам</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
