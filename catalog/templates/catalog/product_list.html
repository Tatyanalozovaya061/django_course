{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block content %}
{% for object in object_list %}
<div class="col-md-4">
    <div class="card mb-4 box-shadow">
        <img class="card-img-top"
             src="{{ object.image }}" height="300"
             alt="Card image cap">
        <div style="height: 170px;" class="card-body">
            <h3 class="card-title pricing-card-title">{{ object.price }} руб.</h3>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <a href="{% url 'catalog:product_list' object.pk %}" class="btn btn-sm btn-outline-secondary">Посмотреть</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
